name: CI

on:
  pull_request:
    branches: [main, refactor]
  push:
    branches: [main, refactor]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
          tools: composer:v2
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.json') }}
      - run: composer install --no-interaction --no-progress
      - run: composer lint

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
    # The current suite is bootstrap-only smoke tests; nothing here actually
    # boots WordPress. Once the rewrite ships real integration tests via
    # wp-env's tests-cli runner, reintroduce a `mode: [single, multisite]`
    # axis and a `wp: [6.x, 6.y]` axis here — and gate `multisite` to
    # protected-branch pushes to keep PR feedback fast.
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
      - run: composer install --no-interaction --no-progress
      - run: composer test

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
      - name: Build distributable ZIP
        run: npm run package
      - name: Extract ZIP for plugin check
        run: |
          mkdir -p /tmp/plugin-check
          unzip dist/debi-payment-for-woocommerce-*.zip -d /tmp/plugin-check
      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: "/tmp/plugin-check"
