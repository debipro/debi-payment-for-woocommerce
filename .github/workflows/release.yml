name: Release

# Runs automatically after CI succeeds on a version tag (v*).
# To release: push a tag, e.g. `git tag v1.2.3 && git push --tags`.
#
# Required GitHub secrets:
#   WP_ORG_SVN_USERNAME  — your WordPress.org username
#   WP_ORG_SVN_PASSWORD  — your WordPress.org password
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  release:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    # Only run when CI passed AND it was triggered by a version tag.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS assets
        run: |
          if [ -f src/index.js ] || [ -f src/index.jsx ] || [ -f src/index.ts ]; then
            npm run build
          else
            echo "No JS source detected; skipping build step."
          fi

      - name: Derive version
        id: version
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${VERSION}"

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
          SLUG: debi-payment-for-woocommerce
          VERSION: ${{ steps.version.outputs.version }}
